layout:
    imports:
        -
            id: oro_customer_page
        -
            id: oro_customer_user_form
            root: page_content

    actions:
        - '@setOption':
            id: page_title
            optionName: defaultValue
            optionValue:
                label: 'oro.customer.customeruser.profile.change_password.title'

        - '@setOption':
            id: customer_user_form
            optionName: form
            optionValue: '=data["oro_customer_frontend_customer_user_form"].getChangePasswordProfileFormView(data["entity"])'

        - '@setOption':
            id: customer_user_form_errors
            optionName: form
            optionValue: '=data["oro_customer_frontend_customer_user_form"].getChangePasswordProfileFormView(data["entity"])'

        - '@add':
            id: customer_user_update_input_action
            parentId: customer_user_form_actions
            blockType: input
            options:
                type: hidden
                name: input_action
                value:
                    route: oro_customer_frontend_customer_user_profile

        - '@removeOption':
            id: customer_user_form_actions_cancel
            optionName: route_name

        - '@appendOption':
            id: customer_user_form_actions_cancel
            optionName: path
            optionValue: '=data["backToUrl"]'

        - '@removeOption':
            id: back_button
            optionName: route_name

        - '@appendOption':
            id: back_button
            optionName: path
            optionValue: '=data["backToUrl"]'

        - '@remove':
            id: customer_user_form_fields_information

        - '@remove':
              id: customer_user_form_fields_roles
